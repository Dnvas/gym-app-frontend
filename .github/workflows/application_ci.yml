name: Frontend CI (Expo Android)

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    name: JS checks (lint + typecheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test -- --ci --maxWorkers=2

  android:
    name: Android build (Expo prebuild + assembleDebug)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: [js]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"  # built-in Gradle cache; replaces manual cache step

      # Cache the generated android/ directory so expo prebuild is skipped
      # on cache hits. Key is based on the inputs that determine prebuild output:
      # package versions (package-lock.json) and app config (app.json).
      - name: Cache Expo prebuild output
        id: prebuild-cache
        uses: actions/cache@v4
        with:
          path: android
          key: ${{ runner.os }}-prebuild-${{ hashFiles('package-lock.json', 'app.json', 'app.config.*') }}
          restore-keys: |
            ${{ runner.os }}-prebuild-

      - name: Generate native Android project
        if: steps.prebuild-cache.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform android --non-interactive

      - name: Make Gradle wrapper executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --build-cache
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
